spring.application.name=Spring_Data_JPA



# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Spring_Data_JPA?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=System@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Optional (Recommended)
# ===============================
spring.jpa.open-in-view=false

